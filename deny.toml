# cargo-deny configuration (0.19.x)
# https://embarkstudios.github.io/cargo-deny/
#
# Run: cargo deny check  (or: just deny)

[advisories]
# Scope for unmaintained crate checks
unmaintained = "workspace"
yanked = "warn"
# Transitive advisories with no fix available — not in our code paths:
# - lru 0.12.5 unsound IterMut (tantivy/lance)
# - rustls-pemfile 2.2.0 (tonic/reqwest)
# - rsa 0.9.10 timing side-channel, no fixed version (lance/object_store)
# - bincode 2.0.1 unmaintained, no alternative (surrealdb)
# - dotenv 0.15.0 unmaintained (surrealdb)
ignore = [
    "RUSTSEC-2026-0002",
    "RUSTSEC-2025-0134",
    "RUSTSEC-2023-0071",
    "RUSTSEC-2025-0141",
    "RUSTSEC-2021-0141",
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "BSL-1.0",
    "OpenSSL",
    "CC0-1.0",
    "MPL-2.0",
    "NCSA",
    "Unlicense",
    "CDLA-Permissive-2.0",
]

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

# Private/unpublished crates (proprietary + examples without license)
[licenses.private]
ignore = true

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "warn"
unknown-git = "allow"  # We use git deps (llama-burn)
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
