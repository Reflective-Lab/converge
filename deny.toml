# cargo-deny configuration (0.19.x)
# https://embarkstudios.github.io/cargo-deny/
#
# Run: cargo deny check  (or: just deny)

[advisories]
unmaintained = "workspace"
yanked = "warn"
# Transitive advisories with no fix available — not in our code paths:
# - rustls-pemfile 2.2.0 (tonic/reqwest)
# - dotenv 0.15.0 unmaintained (surrealdb client used in tests)
ignore = [
    "RUSTSEC-2025-0134",
    "RUSTSEC-2025-0141",
    # quick-xml 0.39.4 — duplicate-attribute quadratic run time (0194) and
    # NsReader namespace-allocation DoS (0195), fixed in >=0.41. Transitive
    # via object_store 0.13.2 (latest); no fix path until object_store
    # releases against 0.41. XML surface is the storage provider's own API
    # responses, both advisories DoS-class. Added 2026-07-02.
    "RUSTSEC-2026-0194",
    "RUSTSEC-2026-0195",
]

[licenses]
allow = [
    "0BSD",
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "BSL-1.0",
    "OpenSSL",
    "CC0-1.0",
    "MPL-2.0",
    "NCSA",
    "Unlicense",
    "CDLA-Permissive-2.0",
]

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

# Private/unpublished crates (proprietary + examples without license)
[licenses.private]
ignore = true

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "warn"
unknown-git = "allow"  # We use git deps (llama-burn)
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
