name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.94.0"
      - uses: Swatinem/rust-cache@v2
      - name: Check workspace
        run: cargo check --workspace
      - name: Run tests
        run: >
          cargo test --workspace
          --exclude converge-remote
          --exclude example-custom-agent
          --exclude example-meeting-scheduler
          --exclude example-custom-provider
          --exclude example-local-inference
          --exclude example-expense-approval
          --exclude example-vendor-selection
          --exclude example-loan-application
          --exclude example-hello-convergence
