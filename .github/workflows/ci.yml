name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rust:
          - 1.90.0
    steps:
    - uses: actions/checkout@v6
    - name: Install Rust
      run: rustup override set ${{ matrix.rust }}
    - name: Build workspace
      run: cargo build --workspace --profile ci
    - name: Run tests
      run: cargo test --workspace --profile ci

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        rust:
          - 1.90.0
        features:
          - "--all-features"
          - "--no-default-features"
          - "--features llama3,ndarray"
          - "--features semantic-embedding"
    steps:
    - uses: actions/checkout@v6
    - name: Install Rust
      run: rustup override set ${{ matrix.rust }}
    - name: Run tests with ${{ matrix.features }}
      run: cargo test --workspace ${{ matrix.features }}

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: build
    steps:
    - uses: actions/checkout@v6
    - name: Install Rust
      run: rustup override set 1.90.0
    - name: Install clippy
      run: rustup component add clippy
    - name: Run clippy
      run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  format:
    name: Format
    runs-on: ubuntu-latest
    needs: build
    steps:
    - uses: actions/checkout@v6
    - name: Install Rust
      run: rustup override set 1.90.0
    - name: Install rustfmt
      run: rustup component add rustfmt
    - name: Check formatting
      run: cargo fmt --all -- --check